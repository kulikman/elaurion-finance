id: pack/next15
version: 1.0.0
status: draft

description: Default policy pack for Next.js 15 repositories.

inherits:
  core:
    - git-protocol
    - anti-hallucination
    - security
  stacks:
    - next15
  domains: []
  skills:
    - code-audit
    - release
    - security-review
    - database-migration

notes:
  - Use for repositories whose installed Next.js major is 15.
  - Do not apply Next.js 16 proxy rules blindly to this pack.
