project: founder-os
repo: kulikman/Founder-OS
status: draft

inherits:
  core:
    - git-protocol
    - anti-hallucination
    - security

  stacks:
    - next15

  domains:
    - ai-agents
    - finance

  skills:
    - code-audit
    - release
    - security-review
    - database-migration

outputs:
  - AGENTS.md
  - CLAUDE.md
  - .cursor/rules/agent-workflow.mdc
  - .claude/commands/check.md
  - .claude/commands/save-work.md
  - .claude/commands/release-work.md
  - .claude/commands/review-work.md

overrides:
  protected_files:
    - src/middleware.ts
    - src/lib/supabase/require-user.ts
    - src/lib/supabase/admin.ts
    - src/types/database.types.ts
    - src/packages/brain-mcp/**
    - supabase/migrations/**

  forbidden:
    - src/proxy.ts
    - server-actions-for-mutations

  checks:
    - pnpm check
    - pnpm test
    - pnpm build
