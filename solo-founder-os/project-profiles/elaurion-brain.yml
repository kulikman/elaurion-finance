project: elaurion-brain
repo: kulikman/elaurion_brain
status: draft

inherits:
  core:
    - git-protocol
    - anti-hallucination
    - security

  stacks:
    - hono-mcp

  domains:
    - ai-agents

  skills:
    - code-audit
    - release
    - security-review
    - database-migration

outputs:
  - AGENTS.md
  - CLAUDE.md
  - .cursor/rules/agent-workflow.mdc
  - .claude/commands/check.md
  - .claude/commands/save-work.md
  - .claude/commands/release-work.md
  - .claude/commands/review-work.md

overrides:
  protected_files:
    - db/migrations/**
    - apps/api/src/db/schema.ts
    - packages/brain-sdk/**
    - apps/api/src/mcp/**

  forbidden:
    - nextjs-assumptions
    - react-assumptions
    - supabase-auth
    - supabase-storage

  checks:
    - pnpm verify
    - pnpm lint
    - pnpm typecheck
    - pnpm test
    - pnpm build
