name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip if the commit was made by semantic-release itself (avoid infinite loop).
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history required for semantic-release to analyse all commits.
          fetch-depth: 0
          # Use a PAT so the release commit can trigger downstream workflows.
          # If you don't have a PAT, the default GITHUB_TOKEN works but won't
          # trigger further workflow runs on the release commit.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
