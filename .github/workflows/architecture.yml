name: Architecture boundaries

on:
  pull_request:
    paths:
      - "src/**"
      - "*.json"
      - "eslint.config.mjs"
      - ".github/workflows/architecture.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
